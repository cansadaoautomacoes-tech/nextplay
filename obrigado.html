<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Obrigado por se cadastrar na NextPlay! Sua diversão em um só aplicativo.">
  <meta name="theme-color" content="#0a0a12">
  <title>Obrigado | NextPlay</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/png" href="assets/logo-nextplay.png">
</head>
<body>

  <!-- Background Effects -->
  <div class="bg-effects"></div>
  <div class="light-rays"></div>
  <div class="particles">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
  </div>

  <!-- Main Content -->
  <main class="thank-you-container" id="thank-you-page">

    <!-- Logo -->
    <div class="logo-wrapper">
      <img src="assets/logo-nextplay.png" alt="NextPlay Logo" id="logo">
    </div>

    <!-- Success Check Icon -->
    <div class="check-icon-wrapper" id="check-icon">
      <div class="check-circle">
        <svg class="check-icon" viewBox="0 0 24 24" aria-hidden="true">
          <polyline class="checkmark" points="6 12 10 16 18 8"></polyline>
        </svg>
      </div>
    </div>

    <!-- Heading -->
    <h1 class="heading">Obrigado!</h1>


    <!-- Info Card -->
    <div class="info-card" id="info-card">
      <p>
        <span class="emoji">🎬</span>
        Em breve você terá acesso a todo o conteúdo da <strong>NextPlay</strong> — 
        sua diversão em um só aplicativo.
      </p>
      <p>
        <span class="emoji">📲</span>
        Fique de olho no seu WhatsApp para receber as instruções de acesso.
      </p>
    </div>



    <!-- Footer -->
    <p class="footer-text">
      © 2026 <a href="#">NextPlay</a> — Sua Diversão em um só Aplicativo
    </p>

  </main>

</body>
</html>
